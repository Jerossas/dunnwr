<div class="gallery" data-gallery>
  <div class="gallery__track gallery__track--{{ .Get "size" | default "medium" }}" data-gallery-track>
    {{ .Inner }}
  </div>

  <div class="gallery__footer">
    <p class="gallery__caption" data-gallery-caption></p>
    <div class="gallery__controls">
      <button class="gallery__btn" data-gallery-prev aria-label="Anterior">&#8592;</button>
      <span class="gallery__counter" data-gallery-counter></span>
      <button class="gallery__btn" data-gallery-next aria-label="Siguiente">&#8594;</button>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll("[data-gallery]").forEach(gallery => {
    const track = gallery.querySelector("[data-gallery-track]");
    const slides = track.querySelectorAll(".slide");
    const caption = gallery.querySelector("[data-gallery-caption]");
    const counter = gallery.querySelector("[data-gallery-counter]");
    const prevBtn = gallery.querySelector("[data-gallery-prev]");
    const nextBtn = gallery.querySelector("[data-gallery-next]");

    let current = 0;

    function update() {
      slides.forEach((slide, i) => {
        slide.classList.toggle("slide--active", i === current);
      });
      caption.textContent = slides[current].querySelector(".slide__caption")?.textContent || "";
      counter.textContent = `${current + 1} / ${slides.length}`;
    }

    prevBtn.addEventListener("click", () => {
      current = current === 0 ? slides.length - 1 : current - 1;
      update();
    });

    nextBtn.addEventListener("click", () => {
      current = current === slides.length - 1 ? 0 : current + 1;
      update();
    });

    update();
  });
});
</script>
